name: Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC (05:30 Asia/Kolkata)
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"
          filename: metrics.svg
